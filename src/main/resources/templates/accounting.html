<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账 - 个人助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <a href="/" class="brand">个人助手</a>
    <ul class="nav-links">
        <li><a href="/accounting" class="active">记账</a></li>
        <li><a href="/health">健康</a></li>
        <li><a href="/todo">待办</a></li>
    </ul>
</nav>

<div class="container">

    <!-- Page Header -->
    <div class="page-header">
        <h1>个人记账</h1>
        <p class="subtitle">记录和管理您的收入与支出</p>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-grid" th:if="${not #lists.isEmpty(stats)}">
        <div class="stat-card" th:each="stat : ${stats}">
            <div class="stat-value" th:text="${stat.total}">0.00</div>
            <div class="stat-label" th:text="${stat.category}">类别</div>
        </div>
    </div>

    <!-- Add Record Form -->
    <div class="card">
        <div class="card-header">添加收支记录</div>
        <div class="card-body">
            <form action="/accounting/add" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">金额 *</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="请输入金额" required>
                    </div>
                    <div class="form-group">
                        <label for="type">收支类型 *</label>
                        <select id="type" name="type" required>
                            <option value="">请选择</option>
                            <option value="INCOME">收入</option>
                            <option value="EXPENSE">支出</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">类别</label>
                        <select id="category" name="category">
                            <option value="">请选择</option>
                            <option value="工资">工资</option>
                            <option value="兼职">兼职</option>
                            <option value="投资">投资</option>
                            <option value="餐饮">餐饮</option>
                            <option value="交通">交通</option>
                            <option value="购物">购物</option>
                            <option value="住房">住房</option>
                            <option value="医疗">医疗</option>
                            <option value="教育">教育</option>
                            <option value="娱乐">娱乐</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="recordDate">日期</label>
                        <input type="date" id="recordDate" name="recordDate">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label for="description">备注</label>
                        <input type="text" id="description" name="description" maxlength="200" placeholder="备注说明（可选）">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">添加记录</button>
            </form>
        </div>
    </div>

    <!-- Record List -->
    <div class="card">
        <div class="card-header">
            <span>收支记录</span>
            <span class="text-muted" style="font-weight: 400; font-size: 13px;"
                  th:text="'共 ' + ${#lists.size(records)} + ' 条'">共 0 条</span>
        </div>
        <div class="card-body no-padding">
            <div th:if="${#lists.isEmpty(records)}" class="empty-state">
                <div class="empty-icon">[ ]</div>
                <p>暂无收支记录，请添加一条记录</p>
            </div>
            <div class="table-wrapper" th:if="${not #lists.isEmpty(records)}">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>类型</th>
                            <th>类别</th>
                            <th>金额</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${records}">
                            <td th:text="${record.recordDate}">2025-06-10</td>
                            <td>
                                <span th:if="${record.type == 'INCOME'}" class="badge badge-green">收入</span>
                                <span th:if="${record.type == 'EXPENSE'}" class="badge badge-red">支出</span>
                            </td>
                            <td th:text="${record.category}">餐饮</td>
                            <td>
                                <span th:if="${record.type == 'INCOME'}" class="text-success">+</span>
                                <span th:if="${record.type == 'EXPENSE'}" class="text-danger">-</span>
                                <span th:text="${record.amount}">150.00</span>
                            </td>
                            <td>
                                <span th:text="${record.description}" class="text-muted">备注</span>
                                <span th:if="${record.description == null or record.description.isEmpty()}" class="text-muted">-</span>
                            </td>
                            <td>
                                <a th:href="@{/accounting/delete/{id}(id=${record.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('确认删除该记录？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer class="footer">
    <p>个人助手系统 &mdash; 软件测试实验项目</p>
</footer>

</body>
</html>
